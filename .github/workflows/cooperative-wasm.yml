name: Cooperative wasm cfg closure

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  wasm32-unknown-unknown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Check beamr cooperative feature closure
        run: cargo check --target wasm32-unknown-unknown -p beamr --no-default-features --features cooperative,json --locked
      - name: Check beamr-wasm manifest closure
        run: cargo check --manifest-path crates/beamr-wasm/Cargo.toml --target wasm32-unknown-unknown --locked
      - name: Install wasm-bindgen test runner
        run: cargo install wasm-bindgen-cli --version 0.2.123 --locked
      - name: Execute beamr-wasm tests
        shell: bash
        run: |
          git rev-parse HEAD
          rustc --version --verbose
          cargo --version
          wasm-bindgen-test-runner --version
          node --version

          output_file="$(mktemp)"
          set +e
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER=wasm-bindgen-test-runner \
            cargo test --manifest-path crates/beamr-wasm/Cargo.toml \
              --target wasm32-unknown-unknown --locked -- --nocapture \
              2>&1 | tee "$output_file"
          runner_status=${PIPESTATUS[0]}
          set -e

          expected_tests=(
            "convert::tests::converts_complex_nested_js_object_to_term"
            "convert::tests::converts_terms_to_js_values"
            "convert::tests::documents_boolean_atom_round_trip_as_atom_names"
            "tests::await_vm_call_resolves_with_js_handler_reply"
            "tests::arbiter_drives_an_actor_call_to_completion"
            "tests::idle_vm_schedules_zero_recurring_callbacks"
            "tests::idle_to_runnable_burst_queues_one_arbiter_turn"
            "tests::arbiter_reedges_after_true_idle"
            "tests::fairness_yield_reports_runnable_remaining"
            "tests::arbiter_installation_rejects_missing_host_primitive"
            "tests::await_exit_waits_for_armed_receive_timer"
            "tests::unified_deadline_keeps_one_host_callback_for_mixed_timer_burst"
            "tests::earlier_deadline_cancels_and_rearms_the_unified_callback"
            "tests::cancelling_earliest_deadline_moves_or_clears_the_unified_callback"
            "tests::later_deadline_does_not_rearm_the_unified_callback"
            "tests::late_fire_delivers_all_due_timer_classes_queues_one_turn_and_arms_next"
            "tests::await_exit_waits_for_armed_native_deliver_timer"
            "tests::cooperative_bytecode_timer_bifs_round_trip_and_arm_unified_deadline"
            "tests::cast_from_true_idle_queues_one_turn_and_coalesces_a_burst"
            "tests::promise_completion_from_true_idle_queues_one_turn_with_durable_result"
            "tests::native_completion_envelope_wakes_parked_handler_through_the_arbiter"
            "tests::native_completion_direct_injection_wakes_parked_handler"
            "tests::trapped_exit_wakes_linked_supervisor_without_external_pump"
            "connection_events::tests::subscription_snapshot_delivers_synthetic_ups_then_live_events_in_shared_vocabulary"
            "connection_events::tests::subscription_synthetics_are_subscriber_local_and_unsubscribe_stops_delivery"
            "connection_events::tests::subscription_during_churn_misses_no_session_and_double_sees_none"
            "tests::cross_process_bytecode_send_delivers_and_coalesces_a_burst"
            "tests::bytecode_spawn_runs_child_under_the_cooperative_scheduler"
            "tests::apply_and_export_fun_dispatch_registered_bifs_without_undef"
            "tests::print_family_lands_in_registered_sink_with_stream_tags"
            "tests::default_sink_routes_output_to_console_with_zero_configuration"
            "tests::take_exit_error_distinguishes_refusal_reasons_from_js"
            "tests::statistics_and_memory_refuse_explicitly_instead_of_fabricating_zeros"
            "tests::native_and_cooperative_spawns_mint_distinct_pids"
            "artifact_loader::tests::manifest_chain_loads_dependencies_before_dependants_with_clean_report"
            "artifact_loader::tests::mutual_cycle_pair_loads_in_manifest_order_and_reports_the_scc"
            "artifact_loader::tests::dep_edge_naming_module_absent_from_manifest_rejects_dependency_missing"
            "artifact_loader::tests::rejecting_fetch_double_rejects_batch_with_artifact_fetch_failed_and_loaded_list"
            "artifact_loader::tests::malformed_artifact_bytes_reject_with_exact_decode_stage_kind_slugs"
            "artifact_loader::tests::non_promise_fetch_return_rejects_with_fetch_protocol"
            "artifact_loader::tests::duplicate_module_names_in_manifest_reject_with_manifest_malformed"
            "artifact_loader::tests::dependant_before_dependency_defers_then_heals_at_call_time"
            "artifact_loader::tests::post_batch_verification_asserts_in_manifest_deferreds_healed_and_reports_absent_targets"
            "artifact_loader::tests::manifest_url_to_executed_module_end_to_end_reaches_settled_completion"
            "artifact_loader::tests::failing_manifest_fetch_rejects_with_manifest_fetch_failed"
            "artifact_loader::tests::artifact_load_error_kind_slug_set_is_closed_and_exact"
            "failure::tests::queued_drain_failure_rejects_await_exit_with_typed_scheduler_failure"
            "failure::tests::manual_drain_failure_returns_typed_error_resets_state_and_latches"
            "failure::tests::terminal_error_returns_null_then_repeatable_json_after_failure"
            "failure::tests::failure_callback_fires_exactly_once_at_first_failure"
            "failure::tests::failure_leg_slug_set_is_closed_and_exact"
            "failure::tests::spawn_edge_wake_failure_swallows_into_latch_with_spawn_edge_leg"
            "failure::tests::deadline_late_fire_wake_failure_reaches_both_surfaces"
            "failure::tests::promise_completion_wake_failure_reaches_both_surfaces"
            "failure::tests::panic_hook_installs_exactly_once_across_vm_constructions"
            "failure::tests::panic_reaches_console_and_registered_callback_before_the_trap"
          )
          assertion_status=0
          for test_name in "${expected_tests[@]}"; do
            if ! grep -Fqx "test ${test_name} ... ok" "$output_file"; then
              echo "missing passing wasm test: ${test_name}" >&2
              assertion_status=1
            fi
          done
          if ! grep -Fq \
            "test result: ok. 56 passed; 0 failed; 0 ignored; 0 filtered out" \
            "$output_file"; then
            echo "missing exact fifty-six-test success summary" >&2
            assertion_status=1
          fi

          # WPORT-6 borrow wall: the artifact loader future holds Arc clones
          # only — zero `.borrow` calls in artifact_loader.rs, mechanically.
          if grep -q "\.borrow" crates/beamr-wasm/src/artifact_loader.rs; then
            echo "borrow wall breached: .borrow found in artifact_loader.rs" >&2
            assertion_status=1
          fi

          if (( runner_status != 0 )); then
            exit "$runner_status"
          fi
          if (( assertion_status != 0 )); then
            exit "$assertion_status"
          fi
