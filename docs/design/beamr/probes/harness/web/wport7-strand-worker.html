<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>WPORT-7 §2 strand — Worker environment</title></head>
<body>
<h1>WPORT-7 §2 timer-strand — Worker environment</h1>
<pre id="log"></pre>
<script type="module">
import { obs, suiteComplete, suiteFatal, now, sleep } from "./probe-common.js";
const log = (m) => { document.getElementById("log").textContent += m + "\n"; };

async function main() {
  const events = [];
  const worker = new Worker("./worker.js", { type: "module" });
  worker.onmessage = (e) => { events.push(e.data); if (e.data.type !== "strand-result") log("worker: " + JSON.stringify(e.data).slice(0, 100)); };
  worker.onerror = (e) => { suiteFatal(new Error("worker.onerror: " + (e.message || e))); };

  // Wait for the worker's ready handshake.
  const t0 = now();
  while (!events.some((m) => m.type === "ready") && now() - t0 < 5000) await sleep(20);

  worker.postMessage({ cmd: "strand", origin: location.origin });

  // Wait for the 20-sample result (generous cap).
  const t1 = now();
  while (!events.some((m) => m.type === "strand-result" || m.type === "worker-error") && now() - t1 < 60000) await sleep(50);

  const err = events.find((m) => m.type === "worker-error");
  if (err) { suiteFatal(new Error(err.message)); return; }
  const result = events.find((m) => m.type === "strand-result");
  obs("strand-worker", result.data);
  log("strand-worker p50=" + result.data.latency.p50 + " max=" + result.data.latency.max +
    " maxArmsDuringWait=" + result.data.maxArmsDuringWait + " allGotProbe=" + result.data.allExitedGotProbe);

  worker.terminate();
  suiteComplete({ probe: "wport7-strand-worker", legs: ["strand-worker"] });
  log("SUITE COMPLETE");
}

main().catch((e) => { suiteFatal(e); log("FATAL " + e); });
</script>
</body>
</html>
