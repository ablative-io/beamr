<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>WPORT-7 PROBE-FAILURE (main thread)</title></head>
<body>
<h1>WPORT-7 PROBE-FAILURE — main-thread failure/panic surfacing + strand rider</h1>
<pre id="log"></pre>
<script type="module">
import {
  installTimerSpies, spySummary, loadBundle, fetchBeam, obs, suiteComplete, suiteFatal,
  installWindowOnerrorRecorder, guardedCall, now, sleep,
} from "./probe-common.js";

const log = (m) => { document.getElementById("log").textContent += m + "\n"; };
const ORIGIN = () => location.origin;

// A console.log/console.error order recorder (1e page-side channel; the runner
// also captures CDP console events). Returns {events, restore}.
function installConsoleRecorder() {
  const events = [];
  const rl = console.log, re = console.error;
  console.log = function (...a) { events.push({ t: now(), stream: "out", text: a.map(String).join(" ") }); return rl.apply(console, a); };
  console.error = function (...a) { events.push({ t: now(), stream: "err", text: a.map(String).join(" ") }); return re.apply(console, a); };
  return { events, restore: () => { console.log = rl; console.error = re; } };
}

async function main() {
  const spy = installTimerSpies();
  const onerror = installWindowOnerrorRecorder();
  const beamr = await loadBundle();
  const panicBeam = await fetchBeam(`${ORIGIN()}/artifacts/panic_probe.beam`);
  const strandBeam = await fetchBeam(`${ORIGIN()}/artifacts/strand_probe.beam`);
  const ioBeam = await fetchBeam(`${ORIGIN()}/artifacts/io_probe.beam`);

  const trace=(leg)=>obs("trace",{leg,t:now()});
  trace("strand");
  // ---- Section 2: timer-strand confirm-or-kill (20 samples, varied phase) ---
  {
    const samples = [];
    const N = 20;
    for (let i = 0; i < N; i++) {
      const vm = beamr.create_vm();
      vm.load_module(strandBeam);
      const pid = vm.spawn("strand_probe", "run", "[]");
      // Vary phase relative to host turn starts: advance the event loop by a
      // cycling number of macrotasks before the measured arm, so the mid-turn
      // 0ms arm lands at different points of any wheel revolution.
      for (let k = 0; k < (i % 4); k++) await new Promise((r) => setTimeout(r, 0));
      const armBefore = spy.arms.length;
      const t0 = now();
      vm.send_message(pid, "go");   // drives the run/0 turn that arms send_after(0) mid-turn
      const completion = JSON.parse(await vm.await_exit(pid));
      const t1 = now();
      const newArms = spy.arms.slice(armBefore);
      samples.push({
        i, latencyMs: +(t1 - t0).toFixed(3),
        state: completion.state, result: completion.result,
        armsDuringWait: newArms.length,
        armDelaysDuringWait: newArms.map((a) => a.delay),
      });
    }
    const lat = samples.map((s) => s.latencyMs).sort((a, b) => a - b);
    const pct = (p) => lat[Math.min(lat.length - 1, Math.floor(p * lat.length))];
    obs("strand", {
      environment: "browser-main",
      samples,
      latency: { n: lat.length, min: lat[0], p50: pct(0.5), p90: pct(0.9), max: lat[lat.length - 1],
                 mean: +(lat.reduce((a, b) => a + b, 0) / lat.length).toFixed(3) },
      allExitedGotProbe: samples.every((s) => s.state === "exited" && s.result === "got_probe"),
      maxArmsDuringWait: Math.max(...samples.map((s) => s.armsDuringWait)),
      note: "CONFIRM if latency clusters near ~1000ms with arm churn per macrotask; KILL if macrotask-scale with one arm -> one fire.",
    });
    log("strand p50=" + obsLatP50(samples));
  }
  function obsLatP50(s) { const l = s.map(x => x.latencyMs).sort((a, b) => a - b); return l[Math.floor(l.length / 2)]; }

  trace("console-ordering");
  // ---- 1e: console stream ordering (default sink) + ordered-sink contrast ---
  {
    const vm = beamr.create_vm();
    vm.load_module(ioBeam);
    const rec = installConsoleRecorder();
    const pid = vm.spawn("io_probe", "interleave", "[]");
    const completion = JSON.parse(await vm.await_exit(pid));
    rec.restore();
    const defaultOrder = rec.events.filter((e) => e.text.startsWith("probe-")).map((e) => `${e.stream}:${e.text}`);

    // Ordered single-stream via register_io_sink (the host opt-in).
    const vm2 = beamr.create_vm();
    vm2.load_module(ioBeam);
    const sinkEvents = [];
    vm2.register_io_sink((stream, text) => sinkEvents.push({ stream, text: String(text).replace(/\n$/, "") }));
    const pid2 = vm2.spawn("io_probe", "interleave", "[]");
    JSON.parse(await vm2.await_exit(pid2));

    obs("console-ordering", {
      state: completion.state, result: completion.result,
      defaultSinkConsoleOrder: defaultOrder,
      note: "Default sink routes out->console.log, err->console.error. A browser devtools console shows one interleaved timeline; Node splits stdout/stderr. Cross-stream order is OUT-OF-CONTRACT (io_sink.rs); the runner's CDP console log is the platform-truth channel.",
      orderedSinkStream: sinkEvents,
      orderedSinkIsInterleavedInOrder: JSON.stringify(sinkEvents.map((e) => e.text)) ===
        JSON.stringify(["probe-out-1","probe-err-1","probe-out-2","probe-err-2","probe-out-3","probe-err-3"]),
    });
    log("1e default order: " + defaultOrder.join(" | "));
  }

  trace("1a-caught+1d");
  // ---- 1a caught + 1d latched-brick (same VM) -------------------------------
  {
    const vm = beamr.create_vm();
    vm.install_probe_panic_bif();
    vm.load_module(panicBeam);
    let cbT = null, cbPayload = null;
    beamr.register_panic_callback((payload) => { cbT = now(); cbPayload = String(payload); });
    const rec = installConsoleRecorder();
    const pid = vm.spawn("panic_probe", "boom", "[]");
    const tCall = now();
    const caught = guardedCall(() => vm.run_step());   // 1a: SYNC panic, caught
    rec.restore();
    obs("1a-caught", {
      caught,
      caughtRuntimeError: caught.errorName === "RuntimeError",
      panicCallbackFired: cbPayload !== null,
      panicCallbackBeforeReturn: cbT !== null && cbT <= now(),
      panicCallbackBeforeTrap: cbT !== null && cbT < now() && cbT >= tCall,
      callbackPayload: cbPayload,
      payloadHasMessage: !!cbPayload && cbPayload.includes("wport7 intentional panic wall probe"),
      payloadHasLocation: !!cbPayload && /\.rs:\d+/.test(cbPayload),
      consoleErrorLine: (rec.events.find((e) => e.stream === "err" && e.text.includes("panicked")) || {}).text || null,
    });
    log("1a-caught class=" + caught.errorName);

    // 1d: every scheduler-touching call on the bricked VM object.
    const reStep = guardedCall(() => vm.run_step());
    const reSend = guardedCall(() => vm.send_message(pid, "x"));
    const reTerminal = guardedCall(() => vm.terminal_error());
    let awaitBehavior;
    try {
      const p = vm.await_exit(pid);
      awaitBehavior = await Promise.race([
        p.then((v) => ({ resolved: v })).catch((e) => ({ rejected: String(e) })),
        sleep(3000).then(() => ({ hung: true, note: "no resolution within 3s" })),
      ]);
    } catch (e) {
      awaitBehavior = { syncTrapped: true, errorName: e && e.constructor ? e.constructor.name : null, message: String(e.message || e).slice(0, 160) };
    }
    // Fresh VM after the brick.
    const fresh = beamr.create_vm();
    fresh.load_module(strandBeam);
    const fpid = fresh.spawn("strand_probe", "run", "[]");
    fresh.send_message(fpid, "go");
    const freshRes = JSON.parse(await fresh.await_exit(fpid));
    obs("1d-latched-brick", {
      run_step: reStep, send_message: reSend, terminal_error: reTerminal, await_exit: awaitBehavior,
      freshVmWorks: freshRes.state === "exited" && freshRes.result === "got_probe",
      freshVmResult: freshRes,
      platformNote: "On this wasm-bindgen toolchain the aborted &mut self borrow from run_step poisons the JS object's borrow guard, so EVERY method on the bricked object re-traps ('recursive use of an object ...') — terminal_error does not reach its null return and await_exit does not return a hanging promise; both re-trap synchronously. The arbiter-internal last_error=None / stuck-Draining reasoning is real but unobservable from JS because the wrapper guard intercepts first.",
    });
    log("1d done; freshVM=" + freshRes.state);
  }

  trace("1a-uncaught");
  // ---- 1a uncaught (window.onerror channel) ---------------------------------
  {
    const legStart = now();
    const vm = beamr.create_vm();
    vm.install_probe_panic_bif();
    vm.load_module(panicBeam);
    let cbT = null, cbPayload = null;
    beamr.register_panic_callback((payload) => { cbT = now(); cbPayload = String(payload); });
    const pid = vm.spawn("panic_probe", "boom", "[]");
    // Drive the SYNC panic in a fresh macrotask with NO try/catch so the trap
    // is uncaught and routes to window.onerror.
    setTimeout(() => { vm.run_step(); }, 0);
    await sleep(300);
    const events = onerror.filter((e) => e.t >= legStart);
    obs("1a-uncaught", {
      windowOnerrorFired: events.length > 0,
      onerrorEvents: events,
      panicCallbackFired: cbPayload !== null,
      panicCallbackBeforeOnerror: cbT !== null && (events.length === 0 || cbT <= events[0].t),
      callbackPayload: cbPayload,
    });
    log("1a-uncaught onerror events=" + events.length);
  }

  trace("1c-queued-turn");
  // ---- 1c queued-turn (ASYNC-entry) panic -----------------------------------
  {
    const legStart = now();
    const vm = beamr.create_vm();
    vm.install_probe_panic_bif();
    vm.load_module(panicBeam);
    let cbT = null, cbPayload = null;
    beamr.register_panic_callback((payload) => { cbT = now(); cbPayload = String(payload); });
    const pid = vm.spawn("panic_probe", "wait_boom", "[]");   // parks in receive
    // send_message queues an external microtask turn; the receive turn panics
    // INSIDE that queued dispatch (no caller to catch).
    const sendGuard = guardedCall(() => vm.send_message(pid, "trigger"));
    await sleep(300);
    const events = onerror.filter((e) => e.t >= legStart);
    obs("1c-queued-turn", {
      sendReturned: !sendGuard.trapped,
      sendGuard,
      trapSurface: events.length > 0 ? "window.onerror/unhandledrejection" : "none-observed",
      onerrorEvents: events,
      panicCallbackFired: cbPayload !== null,
      panicCallbackBeforeTrap: cbT !== null && (events.length === 0 || cbT <= events[0].t),
      callbackPayload: cbPayload,
      hostDispatchAfter: "the queued turn aborted mid-microtask; the VM is bricked (same latched state as 1d). No further turns run for this VM.",
    });
    log("1c onerror events=" + events.length);
  }

  obs("spy-summary", spySummary(spy));
  suiteComplete({ probe: "wport7", legs: ["strand", "console-ordering", "1a-caught", "1d-latched-brick", "1a-uncaught", "1c-queued-turn"] });
  log("SUITE COMPLETE");
}

main().catch((e) => { suiteFatal(e); log("FATAL " + e); });
</script>
</body>
</html>
